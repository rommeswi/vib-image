name: zerotier-install
type: shell
commands:
- cd /tmp
- git clone https://github.com/zerotier/ZeroTierOne.git /tmp/zerotier
- cd /tmp/zerotier
- make -f make-linux.mk
- make -f make-linux.mk install
- cd /tmp
- rm -r zerotier
- apt-get purge -y build-essential clang cargo pkg-config libssl-dev libminiupnpc-dev libnatpmp-dev
- apt-get autoremove -y
- apt-get clean
- rm -rf /root/.cargo /root/.rustup
modules:
- name: make-deps
  type: apt
  source:
    packages:
    - build-essential
    - clang
    - git
    - cargo
    - pkg-config
    - openssl
    - libssl-dev
    - libminiupnpc-dev
    - libnatpmp-dev
