name: theme-switcher
type: shell
commands:
  - cp -rf /theme-switcher/etc/skel/. /etc/skel/
  - chmod +x /usr/local/bin/theme-switch
  # Initial current-theme.conf is the dark theme
  - cp /etc/skel/.config/kitty/tokyonight.conf /etc/skel/.config/kitty/current-theme.conf
  # Enable timers and startup service for all future users via skel symlinks
  - mkdir -p /etc/skel/.config/systemd/user/timers.target.wants
  - mkdir -p /etc/skel/.config/systemd/user/graphical-session.target.wants
  - ln -sf ../theme-day.timer /etc/skel/.config/systemd/user/timers.target.wants/theme-day.timer
  - ln -sf ../theme-night.timer /etc/skel/.config/systemd/user/timers.target.wants/theme-night.timer
  - ln -sf ../theme-startup.service /etc/skel/.config/systemd/user/graphical-session.target.wants/theme-startup.service
  - rm -rf /theme-switcher
