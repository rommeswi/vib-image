# Tokyo Night Day color scheme for kitty terminal emulator
# Based on folke/tokyonight.nvim "day" style
# https://github.com/folke/tokyonight.nvim

foreground #3760bf
background #e1e2e7

# Black
color0 #e9e9ec
color8 #a8aecb

# Red
color1 #f52a65
color9 #f52a65

# Green
color2  #587539
color10 #587539

# Yellow
color3  #8c6c3e
color11 #8c6c3e

# Blue
color4  #2e7de9
color12 #2e7de9

# Magenta
color5  #9854f1
color13 #9854f1

# Cyan
color6  #007197
color14 #007197

# White
color7  #6172b0
color15 #d0d5e3

# Cursor
cursor #3760bf
cursor_text_color #e1e2e7

# Selection highlight
selection_foreground none
selection_background #b2c2f0

# URL color
url_color #587539

# Window borders
active_border_color #2e7de9
inactive_border_color #c4c8da
bell_border_color #8c6c3e

# Tab bar
tab_bar_style fade
tab_fade 1
active_tab_foreground   #2e7de9
active_tab_background   #d4d5db
active_tab_font_style   bold
inactive_tab_foreground #848cb5
inactive_tab_background #d4d5db
inactive_tab_font_style bold
tab_bar_background      #c4c8da

# Title bar (macOS)
macos_titlebar_color #d4d5db
